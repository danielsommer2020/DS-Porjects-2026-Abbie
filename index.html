<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paw Play">
<title>Paw Play</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    touch-action: none;
    overscroll-behavior: none;
    position: fixed;
    top: 0;
    left: 0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
  }

  /* Mode switch button - small, top corner, for humans only */
  #mode-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: opacity 0.3s;
  }

  #mode-btn:active {
    background: rgba(255,255,255,0.3);
  }

  /* Sound toggle */
  #sound-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 18px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* Clear button for paint mode */
  #clear-btn {
    position: fixed;
    top: 16px;
    right: 120px;
    z-index: 100;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* Lock screen overlay */
  #lock-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #fff;
    font-size: 20px;
  }

  #lock-overlay.active {
    display: flex;
  }

  #lock-overlay p {
    margin-bottom: 20px;
    opacity: 0.8;
  }

  #unlock-btn {
    background: #f0c040;
    color: #1a1a2e;
    border: none;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 30px;
    cursor: pointer;
  }

  /* Lock button */
  #lock-btn {
    position: fixed;
    top: 16px;
    left: 70px;
    z-index: 100;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 18px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* Mode label that fades in/out */
  #mode-label {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    color: rgba(255,255,255,0.6);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #mode-label.show {
    opacity: 1;
  }

  /* Fullscreen prompt */
  #fs-prompt {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(240,192,64,0.9);
    color: #1a1a2e;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 20px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<button id="sound-btn" title="Toggle sound">🔊</button>
<button id="lock-btn" title="Lock controls">🔒</button>
<button id="clear-btn">Clear</button>
<button id="mode-btn">Chase Mode</button>

<div id="mode-label"></div>

<div id="lock-overlay">
  <p>Controls are locked for your pup.</p>
  <button id="unlock-btn">Triple-Tap to Unlock</button>
</div>

<div id="fs-prompt" onclick="goFullscreen()">Tap for Fullscreen</div>

<script>
// ============================================================
// PAW PLAY - A Dog Separation Anxiety App
// Two modes: Paint & Chase
// Optimized for dog vision (blue/yellow high contrast)
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// State
let mode = 'paint'; // 'paint' or 'chase'
let soundEnabled = true;
let locked = false;
let particles = [];
let trails = []; // For paint mode persistence
let chaseTarget = null;
let score = 0;
let lastCatchTime = 0;

// Dog-friendly color palette (blues and yellows - what dogs see best)
const DOG_COLORS = [
  '#3498db', // blue
  '#2980b9', // darker blue
  '#5dade2', // light blue
  '#f1c40f', // yellow
  '#f39c12', // orange-yellow
  '#ffd700', // gold
  '#00bfff', // deep sky blue
  '#87ceeb', // sky blue
  '#ffeb3b', // bright yellow
  '#00e5ff', // cyan
];

// Audio context (lazy init on first touch)
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'sine', volume = 0.3) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playPaintSound(x, y) {
  // Map position to pitch for variety
  const freq = 200 + (x / canvas.width) * 600;
  playTone(freq, 0.15, 'sine', 0.2);
}

function playCatchSound() {
  // Happy ascending notes
  playTone(400, 0.1, 'square', 0.2);
  setTimeout(() => playTone(500, 0.1, 'square', 0.2), 80);
  setTimeout(() => playTone(700, 0.2, 'square', 0.2), 160);
  setTimeout(() => playTone(900, 0.3, 'sine', 0.15), 240);
}

function playBounceSound() {
  playTone(300, 0.08, 'triangle', 0.1);
}

function playSqueakSound() {
  const freq = 800 + Math.random() * 400;
  playTone(freq, 0.12, 'sine', 0.25);
  setTimeout(() => playTone(freq * 1.2, 0.08, 'sine', 0.15), 60);
}

// ============================================================
// Canvas setup
// ============================================================

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  if (mode === 'chase' && chaseTarget) {
    // Keep target in bounds
    chaseTarget.x = Math.min(chaseTarget.x, window.innerWidth - chaseTarget.r);
    chaseTarget.y = Math.min(chaseTarget.y, window.innerHeight - chaseTarget.r);
  }
}

window.addEventListener('resize', resize);
resize();

// ============================================================
// Paint Mode
// ============================================================

function addPaintTouch(x, y) {
  const color = DOG_COLORS[Math.floor(Math.random() * DOG_COLORS.length)];
  const radius = 20 + Math.random() * 40;

  // Add to persistent trail
  trails.push({ x, y, color, radius, alpha: 1 });

  // Spawn particles
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 4 + Math.random() * 12,
      color,
      alpha: 1,
      decay: 0.015 + Math.random() * 0.02,
      type: 'paint'
    });
  }

  playPaintSound(x, y);
}

function drawPaintMode() {
  // Dark background with slight fade for trail effect
  ctx.fillStyle = 'rgba(26, 26, 46, 0.03)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  // Draw persistent trails
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    t.alpha -= 0.0008;
    if (t.alpha <= 0) {
      trails.splice(i, 1);
      continue;
    }
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
    ctx.fillStyle = t.color + hexAlpha(t.alpha);
    ctx.fill();

    // Glow effect
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.radius * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = t.color + hexAlpha(t.alpha * 0.3);
    ctx.fill();
  }
}

// ============================================================
// Chase Mode
// ============================================================

function initChaseTarget() {
  const r = 50;
  chaseTarget = {
    x: r + Math.random() * (window.innerWidth - r * 2),
    y: r + Math.random() * (window.innerHeight - r * 2),
    r: r,
    vx: (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 2),
    vy: (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 2),
    color: '#f1c40f',
    pulsePhase: 0,
    caught: false,
    catchAnim: 0
  };
}

function moveChaseTarget() {
  if (!chaseTarget || chaseTarget.caught) return;

  chaseTarget.x += chaseTarget.vx;
  chaseTarget.y += chaseTarget.vy;
  chaseTarget.pulsePhase += 0.05;

  // Bounce off walls
  if (chaseTarget.x - chaseTarget.r < 0) {
    chaseTarget.x = chaseTarget.r;
    chaseTarget.vx = Math.abs(chaseTarget.vx);
    playBounceSound();
  }
  if (chaseTarget.x + chaseTarget.r > window.innerWidth) {
    chaseTarget.x = window.innerWidth - chaseTarget.r;
    chaseTarget.vx = -Math.abs(chaseTarget.vx);
    playBounceSound();
  }
  if (chaseTarget.y - chaseTarget.r < 0) {
    chaseTarget.y = chaseTarget.r;
    chaseTarget.vy = Math.abs(chaseTarget.vy);
    playBounceSound();
  }
  if (chaseTarget.y + chaseTarget.r > window.innerHeight) {
    chaseTarget.y = window.innerHeight - chaseTarget.r;
    chaseTarget.vy = -Math.abs(chaseTarget.vy);
    playBounceSound();
  }
}

function catchTarget(tx, ty) {
  if (!chaseTarget || chaseTarget.caught) return false;

  const dx = tx - chaseTarget.x;
  const dy = ty - chaseTarget.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // Generous hit area for paws/nose
  if (dist < chaseTarget.r * 2.5) {
    chaseTarget.caught = true;
    chaseTarget.catchAnim = 1;
    score++;
    lastCatchTime = Date.now();

    // Explosion particles
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 8;
      const color = DOG_COLORS[Math.floor(Math.random() * DOG_COLORS.length)];
      particles.push({
        x: chaseTarget.x,
        y: chaseTarget.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 8 + Math.random() * 16,
        color,
        alpha: 1,
        decay: 0.02 + Math.random() * 0.02,
        type: 'catch'
      });
    }

    // Star burst
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      particles.push({
        x: chaseTarget.x,
        y: chaseTarget.y,
        vx: Math.cos(angle) * 5,
        vy: Math.sin(angle) * 5,
        radius: 12,
        color: '#ffd700',
        alpha: 1,
        decay: 0.015,
        type: 'star'
      });
    }

    playCatchSound();

    // Respawn after delay
    setTimeout(() => {
      const r = 40 + Math.random() * 20;
      const speed = Math.min(2 + score * 0.3, 6); // Gets faster as score increases
      chaseTarget = {
        x: r + Math.random() * (window.innerWidth - r * 2),
        y: r + Math.random() * (window.innerHeight - r * 2),
        r: r,
        vx: (Math.random() > 0.5 ? 1 : -1) * speed,
        vy: (Math.random() > 0.5 ? 1 : -1) * speed,
        color: DOG_COLORS[Math.floor(Math.random() * DOG_COLORS.length)],
        pulsePhase: 0,
        caught: false,
        catchAnim: 0
      };
    }, 800);

    return true;
  }

  // Near miss - squeak and dodge
  if (dist < chaseTarget.r * 4) {
    playSqueakSound();
    // Dodge away from touch
    const dodgeAngle = Math.atan2(chaseTarget.y - ty, chaseTarget.x - tx);
    const dodgeSpeed = 4 + Math.random() * 3;
    chaseTarget.vx = Math.cos(dodgeAngle) * dodgeSpeed;
    chaseTarget.vy = Math.sin(dodgeAngle) * dodgeSpeed;
  }

  return false;
}

function drawChaseMode() {
  // Clear with dark bg
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  if (!chaseTarget) return;

  if (!chaseTarget.caught) {
    const pulse = 1 + Math.sin(chaseTarget.pulsePhase) * 0.15;
    const r = chaseTarget.r * pulse;

    // Outer glow
    const glow = ctx.createRadialGradient(
      chaseTarget.x, chaseTarget.y, r * 0.5,
      chaseTarget.x, chaseTarget.y, r * 2.5
    );
    glow.addColorStop(0, chaseTarget.color + '60');
    glow.addColorStop(1, chaseTarget.color + '00');
    ctx.beginPath();
    ctx.arc(chaseTarget.x, chaseTarget.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Main ball
    const grad = ctx.createRadialGradient(
      chaseTarget.x - r * 0.3, chaseTarget.y - r * 0.3, r * 0.1,
      chaseTarget.x, chaseTarget.y, r
    );
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, chaseTarget.color);
    grad.addColorStop(1, shadeColor(chaseTarget.color, -40));
    ctx.beginPath();
    ctx.arc(chaseTarget.x, chaseTarget.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.arc(chaseTarget.x - r * 0.25, chaseTarget.y - r * 0.25, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }

  // Score display
  if (score > 0) {
    ctx.font = 'bold 24px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'center';
    ctx.fillText('Catches: ' + score, window.innerWidth / 2, 50);
  }

  // Catch flash
  if (Date.now() - lastCatchTime < 300) {
    const flashAlpha = 1 - (Date.now() - lastCatchTime) / 300;
    ctx.fillStyle = `rgba(255, 215, 0, ${flashAlpha * 0.15})`;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  }
}

// ============================================================
// Shared: Particles
// ============================================================

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;

    if (p.type === 'catch' || p.type === 'paint') {
      p.vy += 0.1; // gravity
    }

    if (p.alpha <= 0) {
      particles.splice(i, 1);
      continue;
    }

    if (p.type === 'star') {
      // Draw star shape
      drawStar(p.x, p.y, p.radius, p.color, p.alpha);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * p.alpha, 0, Math.PI * 2);
      ctx.fillStyle = p.color + hexAlpha(p.alpha);
      ctx.fill();
    }
  }
}

function drawStar(x, y, r, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Date.now() * 0.003);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(angle) * r, Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fillStyle = color + hexAlpha(alpha);
  ctx.fill();
  ctx.restore();
}

// ============================================================
// Utilities
// ============================================================

function hexAlpha(a) {
  const hex = Math.round(Math.max(0, Math.min(1, a)) * 255).toString(16);
  return hex.length === 1 ? '0' + hex : hex;
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// ============================================================
// Touch handling (iPad-compatible)
// ============================================================

// Block ALL default touch/gesture behavior on the entire document.
// This stops Safari from intercepting touches for scrolling,
// pull-to-refresh, pinch-zoom, swipe-back, etc.
document.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false, capture: true });
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false, capture: true });
document.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false, capture: true });
document.addEventListener('gesturestart', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('gesturechange', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('gestureend', (e) => { e.preventDefault(); }, { passive: false });

// Use pointer events (better iPad support) with touch event fallback
function handleInput(x, y) {
  if (locked) return;
  initAudio();

  if (mode === 'paint') {
    addPaintTouch(x, y);
  } else if (mode === 'chase') {
    catchTarget(x, y);
    particles.push({
      x, y,
      vx: 0, vy: 0,
      radius: 15,
      color: '#5dade2',
      alpha: 0.6,
      decay: 0.04,
      type: 'paint'
    });
  }
}

// Pointer events (works on modern iPad Safari 13+)
if (window.PointerEvent) {
  let activePointers = new Set();

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    activePointers.add(e.pointerId);
    canvas.setPointerCapture(e.pointerId);
    handleInput(e.clientX, e.clientY);
  }, { passive: false });

  canvas.addEventListener('pointermove', (e) => {
    e.preventDefault();
    if (activePointers.has(e.pointerId)) {
      handleInput(e.clientX, e.clientY);
    }
  }, { passive: false });

  canvas.addEventListener('pointerup', (e) => {
    activePointers.delete(e.pointerId);
  });

  canvas.addEventListener('pointercancel', (e) => {
    activePointers.delete(e.pointerId);
  });
} else {
  // Fallback: touch events for older devices
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.touches.length; i++) {
      handleInput(e.touches[i].clientX, e.touches[i].clientY);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.touches.length; i++) {
      handleInput(e.touches[i].clientX, e.touches[i].clientY);
    }
  }, { passive: false });
}

// Mouse fallback for desktop testing
canvas.addEventListener('mousedown', (e) => {
  if (window.PointerEvent) return; // Already handled by pointer events
  initAudio();
  if (locked) return;
  handleInput(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', (e) => {
  if (window.PointerEvent) return;
  if (e.buttons !== 1 || locked) return;
  if (mode === 'paint') {
    addPaintTouch(e.clientX, e.clientY);
  }
});

// ============================================================
// UI Controls
// ============================================================

const modeBtn = document.getElementById('mode-btn');
const soundBtn = document.getElementById('sound-btn');
const clearBtn = document.getElementById('clear-btn');
const lockBtn = document.getElementById('lock-btn');
const lockOverlay = document.getElementById('lock-overlay');
const modeLabel = document.getElementById('mode-label');

// Use touchend for buttons since we preventDefault on touchstart at document level.
// Click events won't fire on iOS when touchstart is prevented, so we use touchend directly.
function addButtonHandler(el, handler) {
  el.addEventListener('touchend', (e) => {
    e.stopPropagation();
    handler(e);
  }, { passive: false });
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    handler(e);
  });
}

addButtonHandler(modeBtn, (e) => {
  if (mode === 'paint') {
    mode = 'chase';
    modeBtn.textContent = 'Paint Mode';
    clearBtn.style.display = 'none';
    if (!chaseTarget) initChaseTarget();
    // Clear paint canvas
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    trails.length = 0;
  } else {
    mode = 'paint';
    modeBtn.textContent = 'Chase Mode';
    clearBtn.style.display = 'block';
  }
  showModeLabel();
});

addButtonHandler(soundBtn, (e) => {
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
});

addButtonHandler(clearBtn, (e) => {
  trails.length = 0;
  particles.length = 0;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
});

addButtonHandler(lockBtn, (e) => {
  locked = true;
  lockOverlay.classList.add('active');
  modeBtn.style.display = 'none';
  soundBtn.style.display = 'none';
  clearBtn.style.display = 'none';
  lockBtn.style.display = 'none';
});

// Triple-tap to unlock
let unlockTaps = 0;
let unlockTimer = null;

function doUnlock() {
  locked = false;
  lockOverlay.classList.remove('active');
  modeBtn.style.display = 'block';
  soundBtn.style.display = 'block';
  lockBtn.style.display = 'block';
  if (mode === 'paint') clearBtn.style.display = 'block';
  unlockTaps = 0;
}

lockOverlay.addEventListener('touchend', (e) => {
  e.stopPropagation();
  unlockTaps++;
  clearTimeout(unlockTimer);
  unlockTimer = setTimeout(() => { unlockTaps = 0; }, 600);
  if (unlockTaps >= 3) doUnlock();
}, { passive: false });

// Desktop click fallback
document.getElementById('unlock-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  doUnlock();
});

function showModeLabel() {
  modeLabel.textContent = mode === 'paint' ? 'Paint' : 'Chase';
  modeLabel.classList.add('show');
  setTimeout(() => modeLabel.classList.remove('show'), 2000);
}

// Fullscreen
function goFullscreen() {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  } else if (document.documentElement.webkitRequestFullscreen) {
    document.documentElement.webkitRequestFullscreen();
  }
  document.getElementById('fs-prompt').style.display = 'none';
}

// Show fullscreen prompt if not standalone
if (!window.navigator.standalone) {
  // Only show on non-standalone browsers
  const fsPrompt = document.getElementById('fs-prompt');
  if (document.fullscreenEnabled || document.webkitFullscreenEnabled) {
    fsPrompt.style.display = 'block';
    setTimeout(() => { fsPrompt.style.display = 'none'; }, 8000);
  }
}

// ============================================================
// Main loop
// ============================================================

function animate() {
  if (mode === 'paint') {
    drawPaintMode();
  } else {
    moveChaseTarget();
    drawChaseMode();
  }

  updateParticles();
  requestAnimationFrame(animate);
}

// Start
showModeLabel();
animate();

</script>
</body>
</html>
